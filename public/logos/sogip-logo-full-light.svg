<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="SOGIP Group">
  <defs>
    <linearGradient id="goldGradL" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7A30"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#B8942E"/>
    </linearGradient>
    <linearGradient id="hexGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0EDE8"/>
      <stop offset="100%" stop-color="#E5E1D8"/>
    </linearGradient>
  </defs>

  <!-- Hexagon icon -->
  <polygon
    points="40,12 66,26 66,54 40,68 14,54 14,26"
    fill="url(#hexGradL)"
    stroke="url(#goldGradL)"
    stroke-width="1.5"
  />

  <!-- Rising bars -->
  <rect x="22" y="46" width="6" height="12" rx="1" fill="url(#goldGradL)" opacity="0.45"/>
  <rect x="31" y="37" width="6" height="21" rx="1" fill="url(#goldGradL)" opacity="0.65"/>
  <rect x="40" y="26" width="6" height="32" rx="1" fill="url(#goldGradL)"/>

  <!-- Ascending line -->
  <line x1="22" y1="46" x2="46" y2="26" stroke="url(#goldGradL)" stroke-width="1" opacity="0.3"/>

  <!-- Accent dot -->
  <circle cx="46" cy="26" r="2.5" fill="#C9A84C"/>

  <!-- SOGIP wordmark -->
  <text
    x="82"
    y="36"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="4"
    fill="#1A1A1A"
  >SOGIP</text>

  <!-- Separator -->
  <line x1="82" y1="43" x2="228" y2="43" stroke="url(#goldGradL)" stroke-width="0.6" opacity="0.4"/>

  <!-- GROUP -->
  <text
    x="83"
    y="58"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    font-weight="300"
    letter-spacing="6"
    fill="#9A7A30"
  >GROUP</text>

  <!-- Tagline -->
  <text
    x="83"
    y="71"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="7.5"
    font-weight="300"
    letter-spacing="1.5"
    fill="#6B6B6B"
  >Vision · Innovation · Réalisation</text>
</svg>
