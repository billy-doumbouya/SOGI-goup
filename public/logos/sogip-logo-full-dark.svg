<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="SOGIP Group">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7A30"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C96A"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C24"/>
      <stop offset="100%" stop-color="#0E0E14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon icon -->
  <!-- Flat-top hexagon, center (40, 40), radius 30 -->
  <polygon
    points="40,12 66,26 66,54 40,68 14,54 14,26"
    fill="url(#hexGrad)"
    stroke="url(#goldGrad)"
    stroke-width="1.5"
  />

  <!-- Inner geometric: rising diagonal bars -->
  <!-- Bar 1 (short, bottom-left) -->
  <rect x="22" y="46" width="6" height="12" rx="1" fill="url(#goldGrad)" opacity="0.55"/>
  <!-- Bar 2 (medium, center) -->
  <rect x="31" y="37" width="6" height="21" rx="1" fill="url(#goldGrad)" opacity="0.75"/>
  <!-- Bar 3 (tall, right) -->
  <rect x="40" y="26" width="6" height="32" rx="1" fill="url(#goldGrad)"/>

  <!-- Ascending line above bars -->
  <line x1="22" y1="46" x2="46" y2="26" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4" filter="url(#glow)"/>

  <!-- Top-right accent dot -->
  <circle cx="46" cy="26" r="2.5" fill="#E8C96A" filter="url(#glow)"/>

  <!-- SOGIP wordmark -->
  <text
    x="82"
    y="36"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="4"
    fill="#F0EDE8"
  >SOGIP</text>

  <!-- Thin gold separator line -->
  <line x1="82" y1="43" x2="228" y2="43" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.5"/>

  <!-- GROUP subtitle -->
  <text
    x="83"
    y="58"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    font-weight="300"
    letter-spacing="6"
    fill="#C9A84C"
    opacity="0.85"
  >GROUP</text>

  <!-- Tagline -->
  <text
    x="83"
    y="71"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="7.5"
    font-weight="300"
    letter-spacing="1.5"
    fill="#8A8A8A"
  >Vision · Innovation · Réalisation</text>
</svg>
