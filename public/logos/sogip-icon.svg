<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none" role="img" aria-label="SOGIP Group Icon">
  <defs>
    <linearGradient id="goldGradI" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7A30"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C96A"/>
    </linearGradient>
    <filter id="glowI">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background hex fill -->
  <polygon
    points="28,4 50,16 50,40 28,52 6,40 6,16"
    fill="#0E0E14"
    stroke="url(#goldGradI)"
    stroke-width="1.5"
  />

  <!-- Rising bars (scaled to 56×56) -->
  <rect x="14" y="34" width="5" height="10" rx="0.8" fill="url(#goldGradI)" opacity="0.5"/>
  <rect x="22" y="27" width="5" height="17" rx="0.8" fill="url(#goldGradI)" opacity="0.72"/>
  <rect x="30" y="18" width="5" height="26" rx="0.8" fill="url(#goldGradI)"/>

  <!-- Ascending guide line -->
  <line x1="14" y1="34" x2="35" y2="18" stroke="url(#goldGradI)" stroke-width="0.8" opacity="0.35"/>

  <!-- Accent dot -->
  <circle cx="35" cy="18" r="2" fill="#E8C96A" filter="url(#glowI)"/>
</svg>
